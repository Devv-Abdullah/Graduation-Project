openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Graduation Project Management System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: users
    description: User management
  - name: profiles
    description: Student profiles
  - name: teams
    description: Team management
  - name: invitations
    description: Team invitations
  - name: supervisors
    description: Supervisor requests
  - name: phases
    description: Project phases
  - name: tasks
    description: Task management
  - name: submissions
    description: Task submissions
  - name: meetings
    description: Meeting requests
  - name: notifications
    description: Notifications
  - name: dashboard
    description: Dashboard summaries

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterBody"
      responses:
        "201":
          description: User registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List users
      parameters:
        - name: role
          in: query
          schema:
            type: string
            enum: [student, supervisor, coordinator]
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Users list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /profiles/me:
    get:
      operationId: getMyProfile
      tags: [profiles]
      summary: Get my student profile
      responses:
        "200":
          description: Profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentProfile"
    put:
      operationId: updateMyProfile
      tags: [profiles]
      summary: Update my student profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileBody"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentProfile"

  /profiles/{userId}:
    get:
      operationId: getProfile
      tags: [profiles]
      summary: Get a student profile by user ID
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentProfile"

  /profiles:
    get:
      operationId: listProfiles
      tags: [profiles]
      summary: List student profiles with search
      parameters:
        - name: skills
          in: query
          schema:
            type: string
        - name: minGpa
          in: query
          schema:
            type: number
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Profiles list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StudentProfile"

  /teams:
    get:
      operationId: listTeams
      tags: [teams]
      summary: List all teams
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Teams list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Team"
    post:
      operationId: createTeam
      tags: [teams]
      summary: Create a team
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTeamBody"
      responses:
        "201":
          description: Team created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"

  /teams/{id}:
    get:
      operationId: getTeam
      tags: [teams]
      summary: Get team by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Team
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"
    put:
      operationId: updateTeam
      tags: [teams]
      summary: Update team
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTeamBody"
      responses:
        "200":
          description: Updated team
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"

  /teams/my:
    get:
      operationId: getMyTeam
      tags: [teams]
      summary: Get current user's team
      responses:
        "200":
          description: My team
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"

  /teams/{id}/members:
    get:
      operationId: getTeamMembers
      tags: [teams]
      summary: Get team members
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Members list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TeamMember"

  /teams/{id}/leave:
    post:
      operationId: leaveTeam
      tags: [teams]
      summary: Leave a team
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Left team
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /invitations:
    get:
      operationId: listInvitations
      tags: [invitations]
      summary: List my invitations
      responses:
        "200":
          description: Invitations list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Invitation"
    post:
      operationId: sendInvitation
      tags: [invitations]
      summary: Send team invitation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendInvitationBody"
      responses:
        "201":
          description: Invitation sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invitation"

  /invitations/{id}/accept:
    post:
      operationId: acceptInvitation
      tags: [invitations]
      summary: Accept invitation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /invitations/{id}/reject:
    post:
      operationId: rejectInvitation
      tags: [invitations]
      summary: Reject invitation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /supervisor-requests:
    get:
      operationId: listSupervisorRequests
      tags: [supervisors]
      summary: List supervisor requests
      responses:
        "200":
          description: Requests list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SupervisorRequest"
    post:
      operationId: sendSupervisorRequest
      tags: [supervisors]
      summary: Send supervision request to a supervisor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendSupervisorRequestBody"
      responses:
        "201":
          description: Request sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupervisorRequest"

  /supervisor-requests/{id}/accept:
    post:
      operationId: acceptSupervisorRequest
      tags: [supervisors]
      summary: Accept supervision request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /supervisor-requests/{id}/reject:
    post:
      operationId: rejectSupervisorRequest
      tags: [supervisors]
      summary: Reject supervision request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /coordinator/assign-supervisor:
    post:
      operationId: coordinatorAssignSupervisor
      tags: [supervisors]
      summary: Coordinator manually assigns supervisor to team
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignSupervisorBody"
      responses:
        "200":
          description: Assigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /phases:
    get:
      operationId: listPhases
      tags: [phases]
      summary: List project phases
      responses:
        "200":
          description: Phases list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectPhase"

  /phases/{teamId}:
    get:
      operationId: getTeamPhase
      tags: [phases]
      summary: Get team's current phase
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Phase
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectPhase"

  /phases/{teamId}/advance:
    post:
      operationId: advancePhase
      tags: [phases]
      summary: Advance team to next phase
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Phase advanced
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectPhase"

  /tasks:
    get:
      operationId: listTasks
      tags: [tasks]
      summary: List tasks for my team
      responses:
        "200":
          description: Tasks list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
    post:
      operationId: createTask
      tags: [tasks]
      summary: Create a task (supervisor only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskBody"
      responses:
        "201":
          description: Task created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/{id}:
    get:
      operationId: getTask
      tags: [tasks]
      summary: Get task by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
    put:
      operationId: updateTask
      tags: [tasks]
      summary: Update task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskBody"
      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /submissions:
    get:
      operationId: listSubmissions
      tags: [submissions]
      summary: List submissions
      responses:
        "200":
          description: Submissions list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Submission"
    post:
      operationId: createSubmission
      tags: [submissions]
      summary: Submit a deliverable for a task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSubmissionBody"
      responses:
        "201":
          description: Submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Submission"

  /submissions/{id}/review:
    post:
      operationId: reviewSubmission
      tags: [submissions]
      summary: Review a submission (supervisor)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewSubmissionBody"
      responses:
        "200":
          description: Reviewed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Submission"

  /meetings:
    get:
      operationId: listMeetings
      tags: [meetings]
      summary: List meeting requests
      responses:
        "200":
          description: Meetings list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Meeting"
    post:
      operationId: requestMeeting
      tags: [meetings]
      summary: Request a meeting with supervisor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestMeetingBody"
      responses:
        "201":
          description: Meeting requested
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Meeting"

  /meetings/{id}/approve:
    post:
      operationId: approveMeeting
      tags: [meetings]
      summary: Approve meeting request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Meeting"

  /meetings/{id}/reject:
    post:
      operationId: rejectMeeting
      tags: [meetings]
      summary: Reject meeting request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Meeting"

  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: List my notifications
      responses:
        "200":
          description: Notifications list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

  /notifications/{id}/read:
    post:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark notification as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Marked read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /notifications/read-all:
    post:
      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Mark all notifications as read
      responses:
        "200":
          description: All marked read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /dashboard/student:
    get:
      operationId: getStudentDashboard
      tags: [dashboard]
      summary: Get student dashboard summary
      responses:
        "200":
          description: Student dashboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentDashboard"

  /dashboard/supervisor:
    get:
      operationId: getSupervisorDashboard
      tags: [dashboard]
      summary: Get supervisor dashboard summary
      responses:
        "200":
          description: Supervisor dashboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupervisorDashboard"

  /dashboard/coordinator:
    get:
      operationId: getCoordinatorDashboard
      tags: [dashboard]
      summary: Get coordinator dashboard summary
      responses:
        "200":
          description: Coordinator dashboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoordinatorDashboard"

  /activity-logs:
    get:
      operationId: listActivityLogs
      tags: [dashboard]
      summary: List activity logs
      responses:
        "200":
          description: Activity logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityLog"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [student, supervisor, coordinator]
        createdAt:
          type: string
          format: date-time
      required: [id, name, email, role, createdAt]

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        message:
          type: string
      required: [user, message]

    RegisterBody:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string
        role:
          type: string
          enum: [student, supervisor, coordinator]
      required: [name, email, password, role]

    LoginBody:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required: [email, password]

    StudentProfile:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        gpa:
          type: number
          nullable: true
        skills:
          type: string
          nullable: true
        interests:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        user:
          $ref: "#/components/schemas/User"
      required: [id, userId, user]

    UpdateProfileBody:
      type: object
      properties:
        gpa:
          type: number
          nullable: true
        skills:
          type: string
          nullable: true
        interests:
          type: string
          nullable: true
        description:
          type: string
          nullable: true

    Team:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        projectTitle:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        status:
          type: string
          enum: [forming, active, supervised, completed]
        leaderId:
          type: integer
        supervisorId:
          type: integer
          nullable: true
        currentPhase:
          type: string
          enum: [proposal, progress, final]
          nullable: true
        createdAt:
          type: string
          format: date-time
        leader:
          $ref: "#/components/schemas/User"
        supervisor:
          $ref: "#/components/schemas/User"
          nullable: true
        memberCount:
          type: integer
      required: [id, name, status, leaderId, createdAt, leader, memberCount]

    CreateTeamBody:
      type: object
      properties:
        name:
          type: string
        projectTitle:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
      required: [name]

    UpdateTeamBody:
      type: object
      properties:
        name:
          type: string
        projectTitle:
          type: string
          nullable: true
        description:
          type: string
          nullable: true

    TeamMember:
      type: object
      properties:
        id:
          type: integer
        teamId:
          type: integer
        userId:
          type: integer
        role:
          type: string
          enum: [leader, member]
        joinedAt:
          type: string
          format: date-time
        user:
          $ref: "#/components/schemas/User"
      required: [id, teamId, userId, role, joinedAt, user]

    Invitation:
      type: object
      properties:
        id:
          type: integer
        teamId:
          type: integer
        invitedUserId:
          type: integer
        invitedByUserId:
          type: integer
        status:
          type: string
          enum: [pending, accepted, rejected]
        createdAt:
          type: string
          format: date-time
        team:
          $ref: "#/components/schemas/Team"
        invitedUser:
          $ref: "#/components/schemas/User"
        invitedBy:
          $ref: "#/components/schemas/User"
      required: [id, teamId, invitedUserId, invitedByUserId, status, createdAt, team, invitedUser, invitedBy]

    SendInvitationBody:
      type: object
      properties:
        teamId:
          type: integer
        invitedUserId:
          type: integer
      required: [teamId, invitedUserId]

    SupervisorRequest:
      type: object
      properties:
        id:
          type: integer
        teamId:
          type: integer
        supervisorId:
          type: integer
        status:
          type: string
          enum: [pending, accepted, rejected]
        message:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        team:
          $ref: "#/components/schemas/Team"
        supervisor:
          $ref: "#/components/schemas/User"
      required: [id, teamId, supervisorId, status, createdAt, team, supervisor]

    SendSupervisorRequestBody:
      type: object
      properties:
        supervisorId:
          type: integer
        message:
          type: string
          nullable: true
      required: [supervisorId]

    AssignSupervisorBody:
      type: object
      properties:
        teamId:
          type: integer
        supervisorId:
          type: integer
      required: [teamId, supervisorId]

    ProjectPhase:
      type: object
      properties:
        id:
          type: integer
        teamId:
          type: integer
        phase:
          type: string
          enum: [proposal, progress, final]
        status:
          type: string
          enum: [in_progress, completed]
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
          nullable: true
        team:
          $ref: "#/components/schemas/Team"
      required: [id, teamId, phase, status, startedAt, team]

    Task:
      type: object
      properties:
        id:
          type: integer
        teamId:
          type: integer
        title:
          type: string
        description:
          type: string
          nullable: true
        deadline:
          type: string
          format: date-time
          nullable: true
        phase:
          type: string
          enum: [proposal, progress, final]
        status:
          type: string
          enum: [pending, submitted, reviewed]
        createdAt:
          type: string
